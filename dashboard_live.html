<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard Soporte - Nominativa</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--mg:#c0009a;--mg2:#9a007d;--mg-light:#fdf0fa;--bg:#f5f6fa;--card:#fff;--border:#e8e0ee;--text:#1a1a2e;--muted:#6b7280;--muted2:#9ca3af;--green:#059669;--yellow:#d97706;--red:#dc2626;--shadow:0 1px 4px rgba(0,0,0,.08),0 4px 16px rgba(192,0,154,.06)}
body{font-family:DM Sans,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.header{background:#fff;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;position:sticky;top:0;z-index:100;height:56px;box-shadow:0 2px 8px rgba(192,0,154,.07)}
.header-logo{display:flex;align-items:center;gap:10px;text-decoration:none;margin-right:20px}
.header-logo img{height:32px;width:32px;object-fit:contain}
.header-logo span{font-family:DM Serif Display,serif;font-size:17px;color:var(--mg)}
.header-tabs{display:flex;height:56px;flex:1}
.header-tab{padding:0 18px;height:100%;display:flex;align-items:center;border:none;background:transparent;cursor:pointer;font-family:DM Sans,sans-serif;font-size:13px;font-weight:500;color:var(--muted);border-bottom:2px solid transparent;transition:all .18s;white-space:nowrap}
.header-tab:hover{color:var(--mg);background:var(--mg-light)}
.header-tab.active{color:var(--mg);border-bottom-color:var(--mg);background:var(--mg-light)}
.header-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.badge-fecha{font-family:DM Mono,monospace;font-size:11px;color:var(--muted);background:var(--bg);padding:3px 8px;border-radius:20px;border:1px solid var(--border)}
.btn-pdf{padding:5px 14px;border-radius:6px;border:1px solid var(--mg);background:var(--mg);color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif}
.btn-excel{padding:5px 14px;border-radius:6px;border:1px solid #059669;background:#059669;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:DM Sans,sans-serif}
.filters{background:#fff;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filters label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.filters select,.filters input[type=date]{border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-family:DM Sans,sans-serif;font-size:12px;color:var(--text);background:#fff;cursor:pointer;min-width:110px}
.filter-group{display:flex;align-items:center;gap:6px}
.filter-sep{width:1px;height:22px;background:var(--border);margin:0 4px}
.btn-reset{padding:5px 12px;border-radius:6px;border:1px solid var(--mg);background:#fff;color:var(--mg);font-size:12px;font-weight:600;cursor:pointer}
main{padding:20px 24px;max-width:1600px;margin:0 auto}
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--mg)}
.kpi-card.kpi-warn::before{background:var(--yellow)}
.kpi-card.kpi-ok::before{background:var(--green)}
.kpi-card.kpi-alert::before{background:var(--red)}
.kpi-card.kpi-tipo{grid-column:span 2}
.kpi-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;margin-bottom:4px}
.kpi-value{font-family:DM Serif Display,serif;font-size:28px;color:var(--text);line-height:1}
.kpi-sub{font-size:11px;color:var(--muted);margin-top:4px}
.kpi-tipo-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.kpi-tipo-row{display:flex;align-items:center;gap:5px;background:var(--bg);border-radius:20px;padding:2px 8px;border:1px solid var(--border)}
.kpi-tipo-label{font-size:10px;color:var(--text);white-space:nowrap}
.kpi-tipo-count{font-size:10px;font-family:DM Mono,monospace;color:var(--mg);font-weight:600}
.charts-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px;margin-bottom:20px}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
.chart-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.chart-wrap{position:relative;height:200px}
.cob-section{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow);margin-bottom:20px}
.cob-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px}
.cob-label{flex:0 0 140px;color:var(--muted);font-size:11px;display:flex;align-items:center;gap:6px}
.cob-dot{display:inline-block;width:8px;height:8px;border-radius:50%;flex:0 0 8px}
.cob-bar-wrap{flex:1;background:#f0e8f5;border-radius:4px;height:8px;overflow:hidden}
.cob-bar{height:8px;border-radius:4px;background:var(--mg)}
.cob-pct{flex:0 0 40px;font-family:DM Mono,monospace;font-size:11px;text-align:right}
.cob-counts{flex:0 0 90px;font-size:10px;color:var(--muted);text-align:right}
.res-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;margin-bottom:20px}
.res-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;box-shadow:var(--shadow)}
.res-name{font-family:DM Serif Display,serif;font-size:20px;color:var(--mg);margin-bottom:10px}
.res-kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.res-kpi{text-align:center;padding:8px 4px;background:var(--bg);border-radius:8px}
.res-kpi .val{font-family:DM Mono,monospace;font-size:18px;font-weight:700;color:var(--text)}
.res-kpi .lbl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.dim-label{flex:0 0 130px;color:var(--muted);font-size:10px;text-align:right}
.dim-bar-wrap{flex:1;background:#f0e8f5;border-radius:4px;height:6px;overflow:hidden}
.dim-bar{height:6px;border-radius:4px;background:var(--mg)}
.dim-score{flex:0 0 28px;font-family:DM Mono,monospace;font-size:11px;color:var(--text);text-align:right}
.table-card{background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:20px}
.table-header{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.table-header h3{font-size:13px;font-weight:600;color:var(--text)}
.tbl-wrap{overflow-x:auto;max-height:420px;overflow-y:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead th{position:sticky;top:0;background:#faf8fc;padding:8px 10px;text-align:left;font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);cursor:pointer;white-space:nowrap;user-select:none}
tbody tr{border-bottom:1px solid #f3eef8;cursor:pointer;transition:background .15s}
tbody tr:hover{background:var(--mg-light)}
td{padding:7px 10px;color:var(--text);vertical-align:middle}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px;font-weight:600}
.tag-HRI{background:#dbeafe;color:#1e40af}.tag-GSS{background:#d1fae5;color:#065f46}
.tag-CONSOLIDA{background:#fef3c7;color:#92400e}.tag-DEFISCAL{background:#ede9fe;color:#5b21b6}
.tag-CAVI{background:#fce7f3;color:#9d174d}.tag-INTELLISHS{background:#ffedd5;color:#9a3412}
.tag-ADEM{background:#cffafe;color:#155e75}.tag-FAVINA{background:#f0fdf4;color:#166534}
.tag-CONSOLTUM{background:#ffe4e6;color:#9f1239}.tag-NUFOCUS{background:#ede9fe;color:#4c1d95}
.tag-other{background:#f3f4f6;color:#374151}
.sat-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
.sat-high{background:var(--green)}.sat-mid{background:var(--yellow)}.sat-low{background:var(--red)}.sat-none{background:var(--muted2)}
.no-enc{color:var(--muted2);font-style:italic;font-size:11px}
.voces-section{margin-bottom:20px}
.voces-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.voz-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 16px;margin-bottom:8px;box-shadow:var(--shadow)}
.voz-meta{font-size:10px;color:var(--muted);margin-bottom:4px}
.voz-text{font-size:13px;color:var(--text);font-style:italic}
.rec-section{margin-bottom:24px}
.rec-title{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px}
.rec-item{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:flex-start;gap:10px;box-shadow:var(--shadow)}
.rec-badge{flex:0 0 48px;text-align:center;padding:3px 0;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:.06em}
.rec-badge.alta{background:#fee2e2;color:#991b1b}.rec-badge.media{background:#fef3c7;color:#92400e}.rec-badge.baja{background:#d1fae5;color:#065f46}
.rec-text{font-size:12px;color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,46,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:14px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(192,0,154,.18);border:1px solid var(--border)}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:1}
.modal-head h2{font-family:DM Serif Display,serif;font-size:20px;color:var(--mg)}
.modal-close{border:none;background:none;font-size:20px;cursor:pointer;color:var(--muted);padding:4px 8px;border-radius:6px}
.modal-body{padding:20px}
.modal-section{margin-bottom:16px}
.modal-section-title{font-size:10px;font-weight:700;color:var(--mg);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--mg-light)}
.modal-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:8px}
.modal-field{background:var(--bg);border-radius:6px;padding:8px 10px}
.modal-field label{display:block;font-size:9px;font-weight:700;color:var(--mg);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.modal-field span{font-size:12px;color:var(--text);word-break:break-word}
.sat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:8px}
.sat-item{text-align:center;background:var(--bg);border-radius:8px;padding:10px 6px}
.sat-item .score{font-family:DM Serif Display,serif;font-size:24px;color:var(--mg)}
.sat-item .lbl{font-size:9px;color:var(--muted);margin-top:2px}
@media print{.header-tabs,.filters,.btn-pdf,.btn-excel,.modal-overlay{display:none!important}.header{position:relative;box-shadow:none;border-bottom:2px solid var(--mg)}.header-right{display:flex!important}body{background:#fff}.kpi-card,.chart-card,.res-card,.table-card{box-shadow:none;border:1px solid #ddd;break-inside:avoid}.tbl-wrap{max-height:none;overflow:visible}canvas{max-height:180px!important}}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
#loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.92);display:flex;align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:16px}
#loading-overlay .spinner{width:44px;height:44px;border:4px solid #f3e6f1;border-top:4px solid var(--mg);border-radius:50%;animation:spin 0.9s linear infinite}
#loading-overlay .loading-msg{font-family:'DM Sans',sans-serif;color:var(--mg);font-size:15px;font-weight:500}
#loading-overlay .error-msg{font-family:'DM Sans',sans-serif;color:#dc2626;font-size:14px;text-align:center;max-width:360px}
#loading-overlay .btn-retry{padding:8px 20px;border-radius:8px;background:var(--mg);color:#fff;border:none;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px}
.sync-bar{display:flex;align-items:center;gap:10px}
#last-updated{font-size:11px;color:#9ca3af;font-family:'DM Mono',monospace}
.btn-refresh{padding:5px 12px;border-radius:6px;border:1px solid #d1d5db;background:#fff;color:#374151;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;display:flex;align-items:center;gap:5px}
.btn-refresh:hover{background:#f9fafb}
</style>
</head>

function excelDateToStr(serial) {
  if (!serial && serial !== 0) return '';
  var n = Number(serial);
  if (isNaN(n) || n < 1) return String(serial);
  var d = new Date((n - 25569) * 86400000);
  return d.toISOString().slice(0, 10);
}

function mapTicket(row, respAgg) {
  function g(key) {
    return row[COL[key]] !== undefined ? row[COL[key]] :

  var id = String(g('id') || '').trim();
  var resp = respAgg[id] || {};
  return {
    id: id, fecha: excelDateToStr(g('fecha')), hora_reporte: g('hora_reporte'),
    entorno: g('entorno'), id_usuario: g('id_usuario'),
    nombre_usuario: g('nombre_usuario'), sociedad: g('sociedad'),
    cliente: g('cliente'), modulo: g('modulo'),
    tipo_incidencia: g('tipo_incidencia'),
    empleados_afectados: g('empleados_afectados'),
    monto_afectado: g('monto_afectado'), fecha_limite: excelDateToStr(g('fecha_limite')),
    motivo: g('motivo'), contexto: g('contexto'),
    categoria: g('categoria'), subtipo: g('subtipo'),
    problema: g('problema'), severidad: g('severidad'),

    recurrencia: g('recurrencia'), oportunidad: g('oportunidad'),
    estatus: g('estatus'), fecha_cierre: excelDateToStr(g('fecha_cierre')),
    hora_cierre: g('hora_cierre'), solucion: g('solucion'),

    sat_dim5: resp.sat_dim5 !== undefined ? resp.sat_dim5 : null,
    comentario: resp.comentario || '',
    num_respuestas: resp.count || 0
  };
}

function aggregateResponses(responses) {
  var agg = {};
  (responses || []).forEach(function(r) {
    // Soporta formato anidado (Teams Forms JSON) y plano (Excel tbl_responses)
    var d = (r.data && r.data.data) ? r.data.data : r;
    var sat = d.supportSatisfaction || {};
    var tid = String(d.ticketId1 || d.ticket_id || r.ticket_id || '').trim();
    if (!tid) return;
    var d1 = parseFloat(sat.satisfaccionGeneral || d.d1 || r.d1) || 0;
    var d2 = parseFloat(sat.disponibilidadEquipo  || d.d2 || r.d2) || 0;
    var d3 = parseFloat(sat.claridadComunicacion  || d.d3 || r.d3) || 0;
    var d4 = parseFloat(sat.solucionEfectiva      || d.d4 || r.d4) || 0;
    var d5 = parseFloat(sat.tiempoDeResolucion    || d.d5 || r.d5) || 0;
    var comentario = d.areasForImprovement || r.comentario || '';
    if (!agg[tid]) agg[tid] = {n:0,s1:0,s2:0,s3:0,s4:0,s5:0,comentarios:[]};
    agg[tid].n++; agg[tid].s1+=d1; agg[tid].s2+=d2;
    agg[tid].s3+=d3; agg[tid].s4+=d4; agg[tid].s5+=d5;
    if (comentario) agg[tid].comentarios.push(comentario);
  });
  var result = {};
  Object.keys(agg).forEach(function(tid) {
    var e = agg[tid], n = e.n;
    var d1=e.s1/n, d2=e.s2/n, d3=e.s3/n, d4=e.s4/n, d5=e.s5/n;
    result[tid] = {
      count: n,
      sat_dim1: d1, sat_dim2: d2, sat_dim3: d3, sat_dim4: d4, sat_dim5: d5,
      sat_promedio: (d1+d2+d3+d4+d5)/5,
      comentario: e.comentarios.filter(Boolean).join(' | ')
    };
  });
  return result;
}

var _refreshTimer;

function loadData() {
  var ov = document.getElementById('loading-overlay');
  ov.innerHTML = '<div class="spinner"></div><div class="loading-msg">Cargando datos desde SharePoint…</div>';
  ov.style.display = 'flex';

  fetch(CONFIG.dataUrl, {credentials: 'include'})
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(json) {
      var tickets = json.tickets || [];
      var respAgg = aggregateResponses(json.responses || []);
      RAW = tickets.map(function(row) { return mapTicket(row, respAgg); });
      RAW_MAP = (function() {
        var m = {};
        for (var i = 0; i < RAW.length; i++) m[String(RAW[i].id)] = RAW[i];
        return m;
      })();
      ov.style.display = 'none';
      var lu = document.getElementById('last-updated');
      if (lu) lu.textContent = 'Actualizado: ' + new Date().toLocaleTimeString('es-MX');
      initFilters();
      applyFilters();
    })
    .catch(function(err) {
      ov.innerHTML =
        '<div class="error-msg">No se pudieron cargar los datos.<br>' + err.message + '</div>' +
        '<button class="btn-retry" onclick="loadData()">Reintentar</button>';
      ov.style.display = 'flex';
    });
}

function startAutoRefresh() {
  clearInterval(_refreshTimer);
  _refreshTimer = setInterval(loadData, CONFIG.refreshMinutes * 60 * 1000);
}

    for(var di=0;di<5;di++)h+='<div class="sat-item"><div class="score" style="'+dimColor(ds[di])+'">'+fmt1(ds[di])+'</div><div class="lbl">'+dn[di]+'</div></div>';
    h+='</div>';
    if(t.comentario)h+='<div style="margin-top:12px;padding:10px 14px;background:var(--mg-light);border-radius:8px;font-size:13px;font-style:italic">'+t.comentario+'</div>';
    h+='</div>';
  }
  document.getElementById('modal-body').innerHTML=h;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){if(e.target===document.getElementById('modal-overlay'))closeModalDirect();}
function closeModalDirect(){document.getElementById('modal-overlay').classList.remove('open');}

function renderVoces(){
  var h='',count=0;
  for(var i=0;i<FILTERED.length&&count<15;i++){var t=FILTERED[i];if(t.comentario&&t.comentario.trim()){h+='<div class="voz-card"><div class="voz-meta">Ticket #'+t.id+' - '+t.entorno+' - '+t.resolutor+' - '+t.fecha+'</div><div class="voz-text">"'+t.comentario+'"</div></div>';count++;}}
  document.getElementById('voces-container').innerHTML=h||'<div class="voz-card"><div class="voz-text" style="color:var(--muted)">Sin comentarios.</div></div>';
}

function renderRecomendaciones(){
  var total=FILTERED.length,con=FILTERED.filter(function(t){return t.num_respuestas>0;}).length,pct=total>0?Math.round(con/total*100):0;
  var sp=avgArr(FILTERED.filter(function(t){return t.sat_promedio!==null;}).map(function(t){return t.sat_promedio;}));
  var recs=[];
  if(pct<30)recs.push({p:'alta',t:'Cobertura de encuesta critica: solo '+pct+'% de tickets tienen respuesta.'});
  else if(pct<60)recs.push({p:'media',t:'Cobertura al '+pct+'%. Hay '+(total-con)+' tickets sin respuesta.'});
  if(sp!==null&&sp<3)recs.push({p:'alta',t:'Satisfaccion promedio critica ('+fmt1(sp)+'/5). Revision inmediata recomendada.'});
  else if(sp!==null&&sp<4)recs.push({p:'media',t:'Satisfaccion promedio de '+fmt1(sp)+'/5. Hay margen de mejora.'});
  else if(sp!==null&&sp>=4.5)recs.push({p:'baja',t:'Satisfaccion excelente ('+fmt1(sp)+'/5). Mantener practicas actuales.'});
  if(!recs.length)recs.push({p:'baja',t:'Indicadores dentro de rangos aceptables.'});
  var h='';for(var i=0;i<recs.length;i++)h+='<div class="rec-item"><span class="rec-badge '+recs[i].p+'">'+recs[i].p.toUpperCase()+'</span><span class="rec-text">'+recs[i].t+'</span></div>';
  document.getElementById('rec-container').innerHTML=h;
}

function switchTab(tab){
  document.querySelectorAll('.header-tab').forEach(function(b,i){b.classList.toggle('active',i===(tab==='dashboard'?0:1));});
  document.getElementById('main-content').style.display=tab==='dashboard'?'':'none';
  document.getElementById('filters-bar').style.display=tab==='dashboard'?'':'none';
}

function exportPDF(){switchTab('dashboard');setTimeout(function(){window.print();},300);}

function exportExcel(){
  var sorted=FILTERED.slice().sort(function(a,b){var va=a[sortCol]||'',vb=b[sortCol]||'';return typeof va==='number'?(va-vb)*sortDir:String(va).localeCompare(String(vb))*sortDir;});
  var hdrs=['ID','Fecha','Entorno','Resolutor','Cliente','Modulo','Tipo','Severidad','Estatus','Sat.Promedio','Dim1','Dim2','Dim3','Dim4','Dim5','Comentario','Respuestas'];
  var rows=[hdrs];
  for(var i=0;i<sorted.length;i++){var t=sorted[i];rows.push([t.id,t.fecha,t.entorno,t.resolutor,t.cliente,t.modulo,t.tipo_incidencia,t.severidad,t.estatus,t.sat_promedio,t.sat_dim1,t.sat_dim2,t.sat_dim3,t.sat_dim4,t.sat_dim5,t.comentario,t.num_respuestas]);}
  var ws2=XLSX.utils.aoa_to_sheet(rows);
  ws2['!cols']=hdrs.map(function(h,ci){var max=h.length;for(var ri=1;ri<rows.length;ri++){var v=rows[ri][ci];var len=v!==null&&v!==undefined?String(v).length:0;if(len>max)max=len;}return{wch:Math.min(max+2,50)};});
  var wb2=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb2,ws2,'Tickets');
  var hoy=new Date(),dd=String(hoy.getDate()).padStart(2,'0'),mm=String(hoy.getMonth()+1).padStart(2,'0'),yyyy=hoy.getFullYear();
  XLSX.writeFile(wb2,'tickets_nominativa_'+yyyy+'-'+mm+'-'+dd+'.xlsx');
}

function debounce(fn,ms){var t;return function(){clearTimeout(t);t=setTimeout(fn,ms);};}
var debouncedApply=debounce(applyFilters,150);
(function(){
  var dateInputs=document.querySelectorAll('#f-fecha-desde,#f-fecha-hasta');
  for(var i=0;i<dateInputs.length;i++){
    dateInputs[i].removeAttribute('onchange');
    dateInputs[i].addEventListener('change',debouncedApply);
  }
})();
loadData();
startAutoRefresh();
</script>
